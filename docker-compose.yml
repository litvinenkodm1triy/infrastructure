networks:
  microservices-network:
    driver: bridge

volumes:
  postgres_data:

services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/app/config
    volumes:
      - ./config-repo:/app/config
    networks:
      - microservices-network
    depends_on:
      eureka-server:
        condition: service_started
    # healthcheck отключён
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  postgres:
    image: postgres:15
    container_name: user-postgres
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - microservices-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-network
    depends_on:
      - zookeeper

  user-service:
    build: ../user-service-spring-
    container_name: user-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network
    depends_on:
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - SPRING_DATASOURCE_USERNAME=user_service
      - SPRING_DATASOURCE_PASSWORD=secret123
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  notification-service:
    build: ../notification-service
    container_name: notification-service
    ports:
      - "8082:8082"
    networks:
      - microservices-network
    depends_on:
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration   # <--- ДОБАВЛЕНО
    networks:
      - microservices-network
    depends_on:
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started